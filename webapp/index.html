<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JW Quiz Web MVP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Nunito+Sans:wght@400;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <h1 class="brand">JW Quiz Web</h1>
        <div class="controls">
          <select id="storySelect" class="select"></select>
          <button id="btnCreateStory" class="btn btn-create" type="button">Crea episodio</button>
          <div class="xp-box">XP Totali: <span id="xpValue">0</span></div>
        </div>
      </section>

      <section class="header">
        <h2 id="storyTitle" class="story-title"></h2>
        <div id="storyRef" class="story-ref"></div>
        <div>XP Previsti: <strong id="xpExpected">100</strong></div>
      </section>

      <section id="caption" class="caption"></section>

      <section id="slots" class="slots"></section>

      <section class="actions">
        <button id="btnReveal" class="btn btn-reveal" type="button">Rivela 2 immagini</button>
        <button id="btnHint" class="btn btn-hint" type="button">Mostra indizio</button>
        <button id="btnSolution" class="btn btn-solution" type="button">Rivela soluzione</button>
        <button id="btnNext" class="btn btn-next" type="button">Prossima storia</button>
      </section>

      <section id="solutionPanel" class="solution" hidden>
        <h3>Soluzione</h3>
        <p id="solutionText"></p>
        <p id="scriptureQuote"></p>
        <p><strong>Nota:</strong> <span id="engagementNote"></span></p>
      </section>

      <section id="editorPanel" class="editor" hidden>
        <div class="editor-card">
          <div class="editor-head">
            <div>
              <h3>Crea nuovo episodio</h3>
              <p>Compila i dati come nell'editor desktop e salva in locale nel browser.</p>
            </div>
            <button id="btnCloseEditor" class="btn btn-ghost" type="button">Chiudi</button>
          </div>

          <div class="editor-grid">
            <label class="field">
              <span>Titolo</span>
              <input id="editorTitle" type="text" maxlength="120" />
            </label>
            <label class="field">
              <span>Riferimento biblico</span>
              <input id="editorReference" type="text" maxlength="120" />
            </label>
            <label class="field">
              <span>Parola chiave</span>
              <input id="editorKeyword" type="text" maxlength="80" />
            </label>
            <label class="field field-wide">
              <span>Indizio testo</span>
              <textarea id="editorHint" rows="2"></textarea>
            </label>
            <label class="field field-wide">
              <span>Soluzione</span>
              <textarea id="editorSolution" rows="4"></textarea>
            </label>
            <label class="field field-wide">
              <span>Citazione scritturale</span>
              <textarea id="editorQuote" rows="3"></textarea>
            </label>
            <label class="field field-wide">
              <span>Nota engagement</span>
              <textarea id="editorNote" rows="3"></textarea>
            </label>
          </div>

          <section class="editor-section">
            <h4>5 immagini visibili</h4>
            <div id="editorVisibleImages" class="slot-editor-list"></div>
          </section>

          <section class="editor-section">
            <h4>2 immagini nascoste</h4>
            <div id="editorHiddenImages" class="slot-editor-list"></div>
          </section>

          <section class="editor-section">
            <h4>Immagine indizio</h4>
            <div id="editorHintImage" class="slot-editor-list"></div>
          </section>

          <div class="editor-actions">
            <div id="editorStatus" class="editor-status">I nuovi episodi vengono salvati solo nel browser corrente.</div>
            <button id="btnSaveStory" class="btn btn-next" type="button">Salva episodio</button>
          </div>
        </div>
      </section>

      <section id="pickerPanel" class="picker" hidden>
        <div class="picker-card">
          <div class="picker-head">
            <h3>Scegli un'immagine</h3>
            <button id="btnClosePicker" class="btn btn-ghost" type="button">Chiudi</button>
          </div>
          <label class="field">
            <span>Cerca per chiave PNG</span>
            <input id="assetSearch" type="text" placeholder="Es. 1F411, boy, crown" />
          </label>
          <div id="assetGrid" class="asset-grid"></div>
        </div>
      </section>
    </main>

    <script src="assets.js"></script>
    <script src="stories.js"></script>
    <script src="app.js"></script>
  </body>
</html>
